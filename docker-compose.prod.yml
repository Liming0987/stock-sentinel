version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: stock_sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: 178801185941.dkr.ecr.us-east-1.amazonaws.com/stock-sentinel-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:${DB_PASSWORD}@db:5432/stock_sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: 178801185941.dkr.ecr.us-east-1.amazonaws.com/stock-sentinel-backend:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:${DB_PASSWORD}@db:5432/stock_sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # concurrency=1: FinBERT loads exactly once per container; max-tasks-per-child
    # recycles the process periodically to prevent memory growth
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 --max-tasks-per-child=50
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
    # on-failure stops the crash-restart-reload spiral; the worker_init signal
    # handler in celery_app.py exits with code 1 if DB/schema is not ready,
    # which Docker counts as a failure and applies its restart backoff
    restart: on-failure

  beat:
    image: 178801185941.dkr.ecr.us-east-1.amazonaws.com/stock-sentinel-backend:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:${DB_PASSWORD}@db:5432/stock_sentinel
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: on-failure

  frontend:
    image: 178801185941.dkr.ecr.us-east-1.amazonaws.com/stock-sentinel-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
