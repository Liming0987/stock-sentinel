AWSTemplateFormatVersion: "2010-09-09"
Description: Stock Sentinel — EC2 + ECR infrastructure

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
  KeyPairName:
    Type: String
    Default: stock-sentinel-key
    Description: EC2 key pair name (optional, for emergency SSH access)
  AmiId:
    Type: String
    Description: >
      Pinned Amazon Linux 2023 AMI ID (us-east-1). Update manually when you want to upgrade the OS.
      DO NOT use a dynamic SSM parameter here — a dynamic value causes CloudFormation to replace
      the EC2 instance on every AMI update, wiping all Docker volumes.
      To find the latest AMI: aws ssm get-parameter --name /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64 --query Parameter.Value --output text
    Default: ami-0521cb2d60cfbb1a6
  DataVolumeAvailabilityZone:
    Type: String
    Default: us-east-1c
    Description: >
      AZ for the persistent data EBS volume. Must match the AZ where the EC2 instance runs.
      The DataVolume has DeletionPolicy:Retain — it survives instance replacements and stack deletions.

Resources:
  # ── ECR Repositories ──
  BackendRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: stock-sentinel-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  FrontendRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: stock-sentinel-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # ── Secrets Manager ──
  # NOTE: Values below are PLACEHOLDER. Populate via the AWS Console after stack creation.
  # All credentials share one secret: stock-sentinel/credentials

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: stock-sentinel/credentials
      Description: All third-party API credentials for Stock Sentinel (Reddit, Alpaca)
      SecretString: >-
        {
          "reddit_client_id":"PLACEHOLDER",
          "reddit_client_secret":"PLACEHOLDER",
          "reddit_user_agent":"stock-sentinel/1.0",
          "alpaca_api_key":"PLACEHOLDER",
          "alpaca_api_secret":"PLACEHOLDER",
          "alpaca_paper":true
        }
      Tags:
        - Key: Name
          Value: stock-sentinel-credentials

  # ── Security Group ──
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Stock Sentinel - HTTP, HTTPS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: stock-sentinel-sg

  # ── IAM Role for EC2 (ECR pull + SSM) ──
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: StockSentinelEC2Role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3DeployAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::stock-sentinel-deploy-us-east-1
                  - arn:aws:s3:::stock-sentinel-deploy-us-east-1/*
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Ref AppSecret
        - PolicyName: SNSSendSMS
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"
      Tags:
        - Key: Name
          Value: stock-sentinel-ec2-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: StockSentinelEC2Profile
      Roles:
        - !Ref EC2Role

  # ── Persistent data volume ──
  # DeletionPolicy:Retain means this volume survives EC2 instance replacements
  # and even stack deletion. PostgreSQL data lives here, not on the root EBS.
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Ref DataVolumeAvailabilityZone
      Size: 50
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: stock-sentinel-data
        - Key: Purpose
          Value: PostgreSQL and Docker volume data

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdb
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref DataVolume

  # ── EC2 Instance ──
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      AvailabilityZone: !Ref DataVolumeAvailabilityZone
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !GetAtt SecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Install Docker
          yum update -y
          yum install -y docker
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ec2-user

          # Install Docker Compose v2
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          ln -sf /usr/local/lib/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

          # Create app directory
          mkdir -p /home/ec2-user/stock-sentinel/nginx
          chown -R ec2-user:ec2-user /home/ec2-user/stock-sentinel

          # Create data mount point now; the actual device (/dev/xvdb) is
          # attached by CloudFormation after this UserData completes.
          # The mount-data.sh script runs at service start before docker compose.
          mkdir -p /data/pgdata

          # Script that mounts /dev/xvdb → /data idempotently.
          # Called by the systemd service before docker compose starts.
          cat > /usr/local/bin/mount-data-volume.sh << 'MOUNTSCRIPT'
          #!/bin/bash
          DEVICE=/dev/xvdb
          MOUNT=/data

          # Wait up to 60s for the EBS volume to be attached
          for i in $(seq 1 12); do
            [ -b "$DEVICE" ] && break
            echo "Waiting for data volume at $DEVICE (attempt $i/12)..."
            sleep 5
          done

          if [ ! -b "$DEVICE" ]; then
            echo "WARNING: Data volume $DEVICE not found — PostgreSQL will use ephemeral storage"
            mkdir -p /data/pgdata
            exit 0
          fi

          # Format only if the device has no filesystem (idempotent — safe on existing data)
          if ! blkid -s TYPE "$DEVICE" | grep -q TYPE; then
            echo "Formatting new data volume..."
            mkfs.xfs "$DEVICE"
          fi

          # Mount if not already mounted
          if ! mountpoint -q "$MOUNT"; then
            mount "$DEVICE" "$MOUNT"
            echo "Mounted $DEVICE at $MOUNT"
          fi

          # Ensure PostgreSQL data directory exists with correct ownership
          # UID 999 is the postgres user in the timescaledb Docker image
          mkdir -p "$MOUNT/pgdata"
          chown -R 999:999 "$MOUNT/pgdata"

          # Persist mount across reboots (nofail so boot continues if volume missing)
          UUID=$(blkid -s UUID -o value "$DEVICE" 2>/dev/null || true)
          if [ -n "$UUID" ] && ! grep -q "$UUID" /etc/fstab; then
            echo "UUID=$UUID $MOUNT xfs defaults,nofail 0 2" >> /etc/fstab
          fi
          MOUNTSCRIPT
          chmod +x /usr/local/bin/mount-data-volume.sh

          # Systemd unit — mounts data volume then starts docker compose on every boot
          cat > /etc/systemd/system/stock-sentinel.service << 'SERVICE'
          [Unit]
          Description=Stock Sentinel (docker compose)
          Requires=docker.service
          After=docker.service network-online.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=on-failure
          RestartSec=10
          User=root
          WorkingDirectory=/home/ec2-user/stock-sentinel
          ExecStartPre=/usr/local/bin/mount-data-volume.sh
          ExecStartPre=/usr/local/bin/docker-compose pull --quiet
          ExecStart=/usr/local/bin/docker-compose up
          ExecStop=/usr/local/bin/docker-compose down

          [Install]
          WantedBy=multi-user.target
          SERVICE

          systemctl daemon-reload
          systemctl enable stock-sentinel.service

          # Signal CloudFormation that setup is complete
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource EC2Instance --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: stock-sentinel
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M

Outputs:
  EC2PublicIp:
    Description: Public IP of the EC2 instance (Elastic IP eipalloc-0994f8f9e5ba0797e — managed outside CF)
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: StockSentinelEC2Ip

  EC2InstanceId:
    Description: EC2 Instance ID (used by SSM)
    Value: !Ref EC2Instance
    Export:
      Name: StockSentinelEC2InstanceId

  BackendRepoUri:
    Description: Backend ECR repository URI
    Value: !GetAtt BackendRepo.RepositoryUri

  FrontendRepoUri:
    Description: Frontend ECR repository URI
    Value: !GetAtt FrontendRepo.RepositoryUri

  SecurityGroupId:
    Description: Security group ID
    Value: !GetAtt SecurityGroup.GroupId

  AppSecretArn:
    Description: ARN of the combined credentials secret (populate via AWS Console)
    Value: !Ref AppSecret
    Export:
      Name: StockSentinelAppSecretArn
