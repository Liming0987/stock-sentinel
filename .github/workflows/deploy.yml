name: Deploy to AWS

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 178801185941.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: stock-sentinel-backend
  FRONTEND_REPO: stock-sentinel-frontend
  STACK_NAME: stock-sentinel

jobs:
  # ── Deploy CloudFormation stack (idempotent) ──
  infra:
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.stack.outputs.EC2InstanceId }}
      ec2_ip: ${{ steps.stack.outputs.EC2PublicIp }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        id: stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: ${{ env.STACK_NAME }}
          template: deploy/cloudformation.yml
          capabilities: CAPABILITY_NAMED_IAM
          no-fail-on-empty-changeset: "1"

      - name: Wait for SSM agent
        run: |
          INSTANCE_ID="${{ steps.stack.outputs.EC2InstanceId }}"
          echo "Waiting for SSM agent on $INSTANCE_ID..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null)
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online — waiting 20s for instance to fully settle"
              sleep 20
              exit 0
            fi
            echo "Attempt $i/60 — status: $STATUS"
            sleep 10
          done
          echo "::error::SSM agent not online after 10 minutes"
          exit 1

  # ── Build and push Docker images to ECR ──
  build:
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:latest \
                        -t $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/$BACKEND_REPO --all-tags

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:latest \
                        -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_REPO --all-tags

  # ── Deploy to EC2 via SSM (no SSH) ──
  deploy:
    runs-on: ubuntu-latest
    needs: [infra, build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload config files to S3
        run: |
          BUCKET="stock-sentinel-deploy-${AWS_REGION}"
          aws s3 mb s3://$BUCKET 2>/dev/null || true
          aws s3 cp docker-compose.prod.yml s3://$BUCKET/docker-compose.yml
          aws s3 cp nginx/nginx.conf s3://$BUCKET/nginx.conf
          aws s3 cp .env.example s3://$BUCKET/.env.example

      - name: Deploy via SSM
        run: |
          INSTANCE_ID="${{ needs.infra.outputs.instance_id }}"
          BUCKET="stock-sentinel-deploy-${AWS_REGION}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "cd /home/ec2-user/stock-sentinel",
              "aws s3 cp s3://'"$BUCKET"'/docker-compose.yml docker-compose.yml",
              "aws s3 cp s3://'"$BUCKET"'/nginx.conf nginx/nginx.conf",
              "aws s3 cp s3://'"$BUCKET"'/.env.example .env.example",
              "if [ ! -f .env ]; then cp .env.example .env && echo DB_PASSWORD=$(openssl rand -hex 16) >> .env && echo JWT_SECRET=$(openssl rand -hex 32) >> .env; fi",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 178801185941.dkr.ecr.us-east-1.amazonaws.com",
              "docker compose pull",
              "docker compose up -d --force-recreate --remove-orphans",
              "docker image prune -f",
              "echo Deployment complete"
            ]' \
            --query "Command.CommandId" --output text)

          echo "SSM Command: $COMMAND_ID"

          # Poll for up to 15 minutes (docker compose pull can be slow on cold start)
          STATUS="Pending"
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/90] Status: $STATUS"
            if [[ "$STATUS" != "Pending" && "$STATUS" != "InProgress" ]]; then
              break
            fi
            sleep 10
          done

          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deployment failed"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi

      - name: Summary
        run: |
          echo "## Deployed to ${{ needs.infra.outputs.ec2_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **App:** http://${{ needs.infra.outputs.ec2_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Instance:** \`${{ needs.infra.outputs.instance_id }}\`" >> $GITHUB_STEP_SUMMARY
